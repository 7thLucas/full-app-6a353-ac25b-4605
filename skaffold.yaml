apiVersion: skaffold/v4beta14
kind: Config
build:
  local:
    push: true
  tagPolicy:
    envTemplate:
      template: "12-06-2026-77873h0e-4605-development"
  artifacts:
  - image: quantumteknologi/qb-remix-base
    context: .
    custom:
      buildCommand: |
        if command -v docker >/dev/null 2>&1; then
          docker inspect quantumteknologi/qb-remix-base:12-06-2026 > /dev/null && docker tag quantumteknologi/qb-remix-base:12-06-2026 $IMAGE && ( [ "$PUSH_IMAGE" != "true" ] || docker push $IMAGE )
        elif command -v crane >/dev/null 2>&1; then
          crane cp quantumteknologi/qb-remix-base:12-06-2026 $IMAGE
        else
          echo "Neither docker nor crane CLI found!" && exit 1
        fi
      dependencies:
        paths:
          - '**/*'
        ignore:
          - '.git/**'
          - '.docker/**'
          - 'k8s/**'
          - 'skaffold.yaml'
          - 'node_modules/**'
          - '.skaffold/**'
          - '.dockerignore'
          - '_doc/**'
          - '.tmp/**'
          - 'dist/**'
          - 'build/**'
          - 'coverage/**'
          - 'DESIGN.md'
          - 'PRODUCT.md'
    sync:
      manual:
        - src: '**/*'
          dest: '/app'

manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
